<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fanturk - İklimlendirme Sistemleri</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa; /* Arka plan rengi */
        }

        .navbar {
            background-color: #343a40; /* Header arka plan rengi */
        }

        .navbar-brand {
            color: #ffffff; /* Logo rengi */
        }

        .navbar-nav .nav-link {
            color: #ffffff; /* Menü bağlantı rengi */
        }

        .navbar-nav .nav-link:hover {
            color: #ffc107; /* Menü bağlantı hover rengi */
        }

        .jumbotron {
            background-color: #007bff; /* Jumbotron rengi */
            color: white; /* Yazı rengi */
        }

        .card {
            transition: transform 0.2s; /* Hover efektleri */
        }

        .card:hover {
            transform: scale(1.05); /* Hover efekti */
        }

        /* Gölge efekti */
        .navbar {
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Fanturk</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Anasayfa</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Ürünler</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">İletişim</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Jumbotron -->
    <div class="jumbotron text-center">
        <h1 class="display-4">Fanturk İklimlendirme Sistemleri</h1>
        <p class="lead">Yüksek kaliteli iklimlendirme ve fan sistemleri ile hizmetinizdeyiz.</p>
        <hr class="my-4">
        <p>Daha fazla bilgi için ürünlerimizi inceleyin.</p>
        <a class="btn btn-primary btn-lg" href="#" role="button">Ürünler</a>
    </div>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
